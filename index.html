<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Personal Profile - Alex Chen12345</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Publications API and Styles -->
    <link rel="stylesheet" href="publications-styles.css">
    <link rel="stylesheet" href="projects-styles.css">
    <link rel="stylesheet" href="awards-styles.css">
    <link rel="stylesheet" href="personal-styles.css">
    <link rel="stylesheet" href="contact-styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #FFFFFF;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        .avatar-container {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 6px solid #fff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            position: relative;
        }

        .profile-info {
            margin-top: 20px;
            text-align: center;
        }

        .profile-name-left {
            font-size: 18px;
            font-weight: 600;
            color: #2196F3;
            margin-bottom: 8px;
        }

        .profile-school {
            font-size: 14px;
            color: #1976D2;
            font-weight: 400;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name-header {
            margin-bottom: 60px;
            padding-top: 20px;
            padding-left: 40px;
        }

        .content-grid {
            padding: 0 40px;
        }

        .profile-name {
            font-size: 48px;
            font-weight: 800;
            color: #2196F3;
            margin-bottom: 10px;
            text-align: left;
        }

        .profile-subtitle {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 400;
        }

        .content-grid {
            margin-top: 80px;
        }

        .section-card {
            background: transparent;
            padding: 20px 0;
            margin-bottom: 30px;
            border: none;
            box-shadow: none;
        }

        /* 移除personal-info和contact的边框，全部采用隐形边界 */
        .section-card#personal-info,
        .section-card#contact {
            background: transparent;
            padding: 20px 0;
            border: none;
            border-radius: 0;
        }

        .section-card:hover {
            transform: none;
            box-shadow: none;
        }

        .section-title {
            font-size: 28px;
            font-weight: 700;
            color: #2196F3;
            margin-bottom: 25px;
            position: relative;
            padding-bottom: 15px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 4px;
            background: #1976D2;
            border-radius: 2px;
        }

        .section-content {
            color: #555;
            line-height: 1.8;
            font-size: 16px;
        }

        .section-content p {
            margin-bottom: 15px;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #F5F5F5;
            border-radius: 10px;
            transition: background 0.3s ease;
        }

        .contact-item:hover {
            background: #F5F5F5;
        }

        .contact-icon {
            width: 24px;
            height: 24px;
            fill: #667eea;
        }

        .contact-text {
            color: #555;
            font-size: 16px;
        }

        .timeline {
            position: relative;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #e0e0e0;
        }

        .timeline-item {
            position: relative;
            padding-left: 60px;
            margin-bottom: 30px;
        }

        .timeline-dot {
            position: absolute;
            left: 14px;
            top: 5px;
            width: 14px;
            height: 14px;
            background: #667eea;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 0 3px #667eea;
        }

        .timeline-date {
            font-size: 14px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .timeline-content {
            color: #555;
        }

        .team-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .team-tag {
            background: #ffffff;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .team-tag:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        .team-section {
            margin-bottom: 20px;
        }

        .team-subtitle {
            font-size: 20px;
            font-weight: 600;
            color: #2196F3;
            margin-bottom: 15px;
        }

        .team-description {
            color: #1976D2;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        /* 新布局样式 */
        .layout-container {
            display: flex;
            min-height: 100vh;
        }

        .left-sidebar {
            position: fixed;
            top: 0;
            left: 50px;
            width: 280px;
            height: 100vh;
            background: #FFFFFF;
            z-index: 10;
            overflow-y: auto;
            text-align: center;
        }

        .right-content {
            flex: 1;
            margin-left: 350px;
            min-height: 100vh;
            background: #FFFFFF;
        }

        .avatar-container {
            padding: 40px 20px;
            text-align: center;
            margin-left: 40px;
        }

        .avatar {
            position: relative;
            right: -10px;
        }

        .profile-info {
            margin-top: 20px;
            text-align: center;
        }

        .profile-name-left {
            font-size: 18px;
            font-weight: 600;
            color: #2196F3;
            margin-bottom: 8px;
        }

        .profile-school {
            font-size: 14px;
            color: #1976D2;
            font-weight: 400;
        }

        .nav-bar {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 30px;
            width: 100%;
        }

        .nav-btn {
            background: #FFFFFF;
            border: 1px solid #2196F3;
            border-radius: 10px;
            padding: 12px 20px;
            color: #2196F3;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .nav-btn:hover {
            background: #2196F3;
            color: #FFFFFF;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.3);
        }

        
        .papers-grid {
            display: block; /* 改为块级布局，确保垂直排列 */
        }

        .papers-grid > * {
            margin-bottom: 30px; /* 添加底部间距 */
        }

        .paper-card {
            background: transparent;
            border: none;
            padding: 20px 0;
            transition: none;
        }

        .paper-card:hover {
            transform: none;
            box-shadow: none;
            background: transparent;
        }

        .paper-content {
            display: block;
        }

        .paper-image {
            margin: 15px 0 0 0;
            text-align: left;
            line-height: 0; /* 消除图片下方空白 */
        }

        .paper-image img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            display: block; /* 直接显示完整图片 */
        }

        .paper-info {
            display: block;
        }

        .paper-title {
            font-size: 18px;
            font-weight: 600;
            color: #2196F3;
            margin-bottom: 10px;
        }

        .paper-authors {
            color: #1976D2;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .author {
            font-weight: 500;
        }

        .paper-venue {
            color: #667eea;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .paper-date {
            color: #999;
            font-size: 12px;
            margin-bottom: 15px;
        }

        .paper-links {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .paper-link {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .paper-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .paper-abstract {
            color: #555;
            line-height: 1.6;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .paper-citations {
            color: #1976D2;
            font-size: 13px;
            font-weight: 500;
        }

        .awards-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .award-item {
            display: flex;
            gap: 20px;
            padding: 15px 0;
            background: transparent;
            border: none;
            transition: none;
        }

        .award-item:hover {
            transform: none;
            box-shadow: none;
            background: transparent;
        }

        .award-icon {
            font-size: 40px;
            min-width: 60px;
            text-align: center;
        }

        .award-content {
            flex: 1;
        }

        .award-name {
            font-size: 18px;
            font-weight: 600;
            color: #2196F3;
            margin-bottom: 5px;
        }

        .award-date {
            color: #667eea;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 3px;
        }

        .award-org {
            color: #1976D2;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .award-desc {
            color: #555;
            line-height: 1.6;
            font-size: 14px;
        }

        .projects-grid {
            display: block; /* 改为块级布局，确保垂直排列 */
        }

        .projects-grid > * {
            margin-bottom: 30px; /* 添加底部间距 */
        }

        .project-card {
            background: transparent;
            border: none;
            padding: 20px 0;
            transition: none;
        }

        .project-card:hover {
            transform: none;
            box-shadow: none;
            background: transparent;
        }

        .project-content {
            display: block;
        }

        .project-image {
            margin: 15px 0 0 0;
            text-align: left;
        }

        .project-image img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .project-info {
            display: block;
        }

        .project-title {
            font-size: 20px;
            font-weight: 600;
            color: #2196F3;
            margin-bottom: 5px;
        }

        .project-duration {
            color: #667eea;
            font-size: 14px;
            font-weight: 500;
        }

        .project-description {
            color: #555;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .project-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .tech-tag {
            background: #ffffff;
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 500;
        }

        .project-role,
        .project-team {
            color: #1976D2;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .project-links {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        .project-link {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .project-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .profile-name-header {
            background: #FFFFFF;
            padding: 40px 30px;
            margin-bottom: 40px;
            border-bottom: 1px solid #2196F3;
        }

        .profile-name {
            font-size: 42px;
            font-weight: 800;
            color: #2196F3;
            margin-bottom: 10px;
            text-shadow: none;
        }

        .profile-subtitle {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 400;
        }

        .content-grid {
            padding:1px;
        }

        .section-card {
            margin-bottom: 60px;
        }

        @media (max-width: 968px) {
            .layout-container {
                flex-direction: column;
            }

            .left-sidebar {
                position: relative;
                width: 100%;
                height: auto;
                box-shadow: none;
                border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            }

            .right-content {
                margin-left: 0;
            }

            .nav-bar {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }

            .nav-btn {
                flex: 1;
                min-width: 150px;
                max-width: 200px;
            }
        }

        @media (max-width: 600px) {
            .avatar-container {
                padding: 30px 20px;
            }

            .nav-bar {
                flex-direction: column;
            }

            .nav-btn {
                min-width: auto;
                max-width: none;
            }

            .content-grid {
                padding: 20px;
            }

            .profile-name {
                font-size: 28px;
            }

            .profile-subtitle {
                font-size: 16px;
            }
        }

        @media (max-width: 968px) {
            .content-grid {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .profile-name {
                font-size: 36px;
            }

            .profile-subtitle {
                font-size: 20px;
            }

            .avatar {
                width: 120px;
                height: 120px;
            }

            .section-card {
                padding: 30px;
            }
        }

        @media (max-width: 600px) {
            .profile-name-header {
                margin-top: 100px;
                margin-bottom: 40px;
            }

            .profile-name {
                font-size: 28px;
            }

            .section-title {
                font-size: 24px;
            }
        }

        /* 语言切换按钮样式 */
        .language-toggle-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #E3F2FD;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.2);
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
            color: #2196F3;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .language-toggle-btn:hover {
            background: #D1E8FF;
            transform: scale(1.05);
            box-shadow: 0 6px 16px rgba(33, 150, 243, 0.3);
        }

        .language-toggle-btn:active {
            transform: scale(0.95);
        }

        .language-toggle-btn[data-lang="en"] {
            font-size: 12px;
        }
    </style>
</head>
<body>
    <!-- 语言切换按钮 -->
    <button id="language-toggle" class="language-toggle-btn" data-lang="zh">语言</button>

    <div class="layout-container">
        <!-- 左侧固定区域 -->
        <div class="left-sidebar">
            <div class="avatar-container">
                <div class="avatar" id="avatar-container">
                    <img id="avatar-image" src="" alt="User Avatar" style="display: none; width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
                    <!-- Default avatar will be set by JavaScript -->
                </div>
                <div class="profile-info">
                    <h3 class="profile-name-left">username</h3>
                    <p class="profile-school">userschool</p>
                </div>
                <nav class="nav-bar">
                    <button class="nav-btn" data-target="personal-info">Personal Introduction</button>
                    <button class="nav-btn" data-target="papers">Publications</button>
                    <button class="nav-btn" data-target="awards">Awards & Honors</button>
                    <button class="nav-btn" data-target="projects">Projects</button>
                    <button class="nav-btn" data-target="contact">Contact Information</button>
                </nav>
            </div>
        </div>

        <!-- 右侧滚动区域 -->
        <div class="right-content">
            <div class="profile-name-header">
                <h1 class="profile-name">username</h1>
            </div>

            <div class="content-grid">
                <div class="section-card" id="personal-info">
                    <h2 class="section-title" data-lang-key="personal-info">Personal Introduction</h2>
                    <div class="section-content">
                        <div id="personal-container" class="personal-container">
                            <!-- Personal info will be loaded here dynamically -->
                            <div class="personal-loading">
                                <div class="loading-spinner"></div>
                                <p>Loading personal info...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Papers Section -->
                <div class="section-card" id="papers">
                    <h2 class="section-title" data-lang-key="papers">Publications</h2>
                    <div class="section-content">
                        <div id="publications-container" class="publications-container">
                            <!-- Publications will be loaded here dynamically -->
                            <div class="publications-loading">
                                <div class="loading-spinner"></div>
                                <p>Loading publications...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Awards Section -->
                <div class="section-card" id="awards">
                    <h2 class="section-title" data-lang-key="awards">Awards & Honors</h2>
                    <div class="section-content">
                        <div id="awards-container" class="awards-container">
                            <!-- Awards will be loaded here dynamically -->
                            <div class="awards-loading">
                                <div class="loading-spinner"></div>
                                <p>Loading awards...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Projects Section -->
                <div class="section-card" id="projects">
                    <h2 class="section-title" data-lang-key="projects">Projects</h2>
                    <div class="section-content">
                        <div id="projects-container" class="projects-container">
                            <!-- Projects will be loaded here dynamically -->
                            <div class="projects-loading">
                                <div class="loading-spinner"></div>
                                <p>Loading projects...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="section-card" id="contact">
                    <h2 class="section-title">Contact Information</h2>
                    <div class="section-content">
                        <div id="contact-container" class="contact-container">
                            <!-- Contact info will be loaded here dynamically -->
                            <div class="contact-loading">
                                <div class="loading-spinner"></div>
                                <p>Loading contact info...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- API Scripts -->
    <!-- Language Resources and Manager -->
    <script src="language.js"></script>
    <script src="language-manager.js"></script>

    <!-- API Scripts -->
    <script src="github-config.js"></script>
    <script src="avatar-api.js"></script>
    <script src="publications-api.js"></script>
    <script src="projects-api.js"></script>
    <script src="awards-api.js"></script>
    <script src="personal-api.js"></script>
    <script src="contact-api.js"></script>
    <script>
        // 获取所有导航按钮和对应的目标元素
        const navButtons = document.querySelectorAll('.nav-btn');
        const sections = {
            'personal-info': document.getElementById('personal-info'),
            'papers': document.getElementById('papers'),
            'awards': document.getElementById('awards'),
            'projects': document.getElementById('projects'),
            'contact': document.getElementById('contact')
        };

        // 点击导航按钮时的平滑滚动
        navButtons.forEach(button => {
            button.addEventListener('click', () => {
                const targetId = button.getAttribute('data-target');
                const targetSection = sections[targetId];

                if (targetSection) {
                    targetSection.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });

        // Add smooth scrolling for all internal links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });

        // Add loading animation for cards
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -10px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, observerOptions);

        // Observe all cards
        document.querySelectorAll('.section-card, .paper-card, .award-item, .project-card').forEach(card => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            card.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
            observer.observe(card);
        });
    </script>
</body>
</html>
